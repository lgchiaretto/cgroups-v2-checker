---
# main.yaml - Deploy cgroups v2 Checker test lab workloads on OpenShift
#
# Creates sample workloads with various Java, Node.js, and OS versions
# to exercise the cgroups v2 Checker scanner across severity levels.
#
# Variables injected by run-product.yaml:
#   cluster_kubeconfig, clustername, cluster_api_url,
#   cluster_kubeadmin_password, product_name, domain,
#   provisioner_url, provisioner_token, product_deployment_id,
#   _playbook_dir (resolved by run-product.yaml to the playbook directory)

- name: Deploy cgroups v2 Checker test lab
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    kubeconfig_path: >-
      {{ (lookup('env', 'TMPDIR') | default('/tmp', true)) ~ '/cgv2-kubeconfig-' ~
      (clustername | default('cluster') | regex_replace('[^a-zA-Z0-9_-]', '-')) }}

  tasks:
    - name: Load lab variables
      ansible.builtin.include_vars:
        file: "{{ _playbook_dir }}/vars/lab.yaml"

    - name: Require cluster kubeconfig
      ansible.builtin.assert:
        that:
          - cluster_kubeconfig is defined
          - cluster_kubeconfig | length > 0
          - cluster_kubeconfig is search('apiVersion:', ignorecase=False)
        fail_msg: "cluster_kubeconfig is required."

    - name: Write kubeconfig for kubernetes.core
      ansible.builtin.copy:
        dest: "{{ kubeconfig_path }}"
        mode: '0600'
        content: "{{ cluster_kubeconfig }}"
      no_log: true

    - name: Verify cluster is reachable
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig_path }}"
        api_version: config.openshift.io/v1
        kind: ClusterVersion
        name: version
      register: cluster_version

    - name: Show cluster version
      ansible.builtin.debug:
        msg: "Connected to OpenShift {{ cluster_version.resources[0].status.desired.version }}"

    - name: Create namespaces
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ lab_prefix }}-{{ item.name }}"
            labels:
              lab: "{{ lab_prefix }}"
      loop: "{{ namespaces }}"
      loop_control:
        label: "{{ lab_prefix }}-{{ item.name }}"

    - name: Deploy standard containers
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        definition: "{{ lookup('ansible.builtin.template', _playbook_dir ~ '/templates/deployment.yaml.j2') }}"
      vars:
        ns_name: "{{ lab_prefix }}-{{ item.0.name }}"
        deploy: "{{ item.1 }}"
      loop: "{{ namespaces | subelements('deployments') }}"
      loop_control:
        label: "{{ lab_prefix }}-{{ item.0.name }}/{{ item.1.name }}"
      when: item.1.type is not defined

    - name: Deploy multi-container and initContainer workloads
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        definition: "{{ lookup('ansible.builtin.template', _playbook_dir ~ '/templates/deployment-multi.yaml.j2') }}"
      vars:
        ns_name: "{{ lab_prefix }}-{{ item.0.name }}"
        deploy: "{{ item.1 }}"
      loop: "{{ namespaces | subelements('deployments') }}"
      loop_control:
        label: "{{ lab_prefix }}-{{ item.0.name }}/{{ item.1.name }}"
      when: item.1.type is defined

    - name: Wait for deployments (best-effort, some images may fail to pull)
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig_path }}"
        api_version: apps/v1
        kind: Deployment
        namespace: "{{ lab_prefix }}-{{ item.0.name }}"
        name: "{{ item.1.name }}"
      register: deploy_status
      until:
        - deploy_status.resources | length > 0
        - deploy_status.resources[0].status.availableReplicas | default(0) >= (item.1.replicas | default(1))
      retries: 24
      delay: 5
      loop: "{{ namespaces | subelements('deployments') }}"
      loop_control:
        label: "{{ lab_prefix }}-{{ item.0.name }}/{{ item.1.name }}"
      ignore_errors: true

    - name: Count total pods
      ansible.builtin.set_fact:
        total_pods: "{{ namespaces | map(attribute='deployments') | flatten | map(attribute='replicas', default=1) | map('int') | sum }}"

    - name: Lab summary
      ansible.builtin.debug:
        msg: |
          ╔══════════════════════════════════════════════════════════════╗
          ║  cgroups v2 Checker — Test Lab Ready                       ║
          ╠══════════════════════════════════════════════════════════════╣
          {% for ns in namespaces %}
          ║  {{ lab_prefix }}-{{ ns.name }}:
          {% for d in ns.deployments %}
          ║    {{ '%-25s' | format(d.name) }} ×{{ d.replicas | default(1) }} → {{ d.expected | default('') }}
          {% endfor %}
          {% endfor %}
          ╠══════════════════════════════════════════════════════════════╣
          ║  Total: ~{{ total_pods }} pods across {{ namespaces | length }} namespaces              ║
          ╚══════════════════════════════════════════════════════════════╝

    - name: Publish application credentials to Provisioner
      ansible.builtin.uri:
        url: "{{ provisioner_url | regex_replace('/+$', '') }}/api/v1/products/deployments/{{ product_deployment_id }}/credentials"
        method: POST
        body_format: json
        headers:
          Authorization: "Bearer {{ provisioner_token }}"
          Content-Type: "application/json"
        body:
          items:
            - title: "cgroups v2 Checker — Test Lab"
              url: "n/a"
              username: "n/a"
              password: "n/a"
              description: "{{ total_pods }} test pods across {{ namespaces | length }} namespaces ({{ lab_prefix }}-*)"
        status_code:
          - 200
        validate_certs: false
      when:
        - product_deployment_id is defined
        - product_deployment_id | string | length > 0
        - provisioner_token is defined
        - provisioner_token | string | length > 0
        - provisioner_url is defined
        - provisioner_url | string | length > 0
      ignore_errors: true

    - name: Remove kubeconfig file
      ansible.builtin.file:
        path: "{{ kubeconfig_path }}"
        state: absent
      no_log: true
