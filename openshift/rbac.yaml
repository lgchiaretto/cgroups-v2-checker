---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cgroups-v2-checker
  namespace: cgroups-v2-checker
  labels:
    app.kubernetes.io/name: cgroups-v2-checker
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cgroups-v2-checker
  labels:
    app.kubernetes.io/name: cgroups-v2-checker
rules:
  # List pods in all namespaces (paginated)
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes"]
    verbs: ["get", "list"]
  # Read ImagePullSecrets and ServiceAccounts for registry auth
  - apiGroups: [""]
    resources: ["secrets", "serviceaccounts"]
    verbs: ["get"]
  # Read OpenShift version and image config
  - apiGroups: ["config.openshift.io"]
    resources: ["clusterversions", "images"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cgroups-v2-checker
  labels:
    app.kubernetes.io/name: cgroups-v2-checker
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cgroups-v2-checker
subjects:
  - kind: ServiceAccount
    name: cgroups-v2-checker
    namespace: cgroups-v2-checker
